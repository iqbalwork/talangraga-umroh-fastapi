# render.yaml
# Render Blueprint configuration for deploying FastAPI and PostgreSQL

services:
  # FastAPI Web Service
  - type: web
    name: talangraga-backend
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: ENV
        value: production
      - key: API_PREFIX
        value: /api
      - key: DATABASE_URL
        fromDatabase:
          name: talangraga-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: REFRESH_SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: ALGORITHM
        value: HS256
      # Sync these with your own Cloudinary details in the Render Dashboard
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: talangraga-db
    plan: free
    databaseName: talangraga
    user: postgres
