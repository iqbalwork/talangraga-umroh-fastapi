# version: "3.9"

services:
  backend:
    build: .
    container_name: talangraga-backend
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    container_name: talangraga-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: talangraga
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d talangraga"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
